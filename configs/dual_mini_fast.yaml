# ============================================================
# AOAE — Maximum Speed Config (optimized for 300+ TPS)
#
# Key speed optimizations:
#   - 8 diffusion steps (vs 64 default) — biggest single speedup
#   - primary_every_n=16: primary only on first + last step
#   - EMA threshold=0.0: disable agreement-based primary forcing
#   - soft_topk=16: pruned soft routing (16 of 128 experts)
#   - compose_gamma=0.0: skip composed prediction overhead
#   - track_kv_dynamics=false: no diagnostic overhead
#   - temperature=0.0: greedy argmax (no sampling overhead)
# ============================================================

base_model:
  name_or_path: "inclusionAI/LLaDA2.1-mini"
  torch_dtype: "bfloat16"
  mask_token_id: 156895
  backend: "dual"
  routing_temperature: 0.1
  allow_python_fallback_ops: true
  soft_topk: 16

soft_mask:
  top_k: 5
  omega_s_init: 0.8
  omega_a_init: 1.0
  omega_b_init: 2.0

policy:
  d_model: 128
  n_layers: 1
  n_heads: 4
  dropout: 0.0
  use_positional_features: false
  use_age_feature: false
  use_last_action_feature: false
  boundary_head:
    enabled: false
    num_bins: 8

prism:
  hidden_dim: 256
  threshold: 0.5
  train_samples: 10000
  epochs: 3
  lr: 1.0e-3
  batch_size: 4

cache:
  enabled: true

grpo:
  enabled: false
  group_size: 2
  clip_eps: 0.2
  alpha: 1.0
  beta: 0.1
  access_reward_weight: 0.0
  lr: 3.0e-4
  weight_decay: 0.01
  epochs: 5
  max_steps: 5000
  batch_size: 1
  grad_accum_steps: 4
  warmup_steps: 50
  max_grad_norm: 1.0
  policy_temperature: 1.0

inference:
  steps: 8
  gen_length: 256
  temperature: 0.0
  fallback_unmask: true
  disable_remask: true
  primary_every_n: 999
  primary_agree_threshold: 0.0
  force_primary_first_last: false
  positional_cache:
    enabled: false
  reuse_signal:
    method: "argmax_match"
    threshold: 0.0
  block_length: 32
  compose_gamma: 0.0

analysis:
  track_kv_dynamics: false
  keep_step_traces: false

data:
  train_dataset: "nvidia/OpenMathInstruct-2"
  train_split: "train"
  train_max_samples: 50000
  eval_dataset: "openai/gsm8k"
  eval_split: "test"
  eval_max_samples: 1319
  max_prompt_len: 512
  max_answer_len: 256

evaluation:
  task_type: "math"
  code:
    timeout_sec: 3.0
    cpu_time_limit_sec: 2
    memory_limit_mb: 1024

logging:
  project: "aoae"
  run_name: "dual_mini_fast"
  log_every: 50
  eval_every: 500
  save_every: 500
  output_dir: "outputs/dual_mini_fast/"
  use_wandb: false

hardware:
  seed: 42
  bf16: true
  tp_size: 2
  deterministic: false
