# ============================================================
# POC 1 — Soft Routing Trade-off (SGLang runtime)
#
# Same sweep design as configs/poc1_tau_sweep.yaml, but load dInfer
# through SGLang instead of the vLLM-backed path.
# ============================================================

base_model:
  name_or_path: "inclusionAI/LLaDA2.1-mini"
  torch_dtype: "bfloat16"
  mask_token_id: 156895
  backend: "dual"
  dinfer_runtime: "sglang"
  dinfer_ep_size: 1
  routing_temperature: 0.1          # overridden by sweep
  allow_python_fallback_ops: true
  soft_topk: 16                     # 2× top_k; fixed across all τ_r

soft_mask:
  top_k: 5
  omega_s_init: 0.8
  omega_a_init: 1.0
  omega_b_init: 2.0

policy:
  d_model: 128
  n_layers: 1
  n_heads: 4
  dropout: 0.0
  use_positional_features: false
  use_age_feature: true
  use_last_action_feature: true
  boundary_head:
    enabled: false

prism:
  hidden_dim: 256
  threshold: 0.5
  train_samples: 10000
  epochs: 3
  lr: 1.0e-3
  batch_size: 4

cache:
  enabled: true

grpo:
  enabled: false

inference:
  steps: 32
  gen_length: 512
  temperature: 0.0
  fallback_unmask: true
  disable_remask: true
  primary_every_n: 1
  primary_agree_threshold: 0.0
  force_primary_first_last: false
  compose_gamma: 0.0
  positional_cache:
    enabled: false
  reuse_signal:
    method: "argmax_match"
    threshold: 0.0
  block_length: 32

analysis:
  track_kv_dynamics: false
  keep_step_traces: false

data:
  train_dataset: "nvidia/OpenMathInstruct-2"
  train_split: "train"
  train_max_samples: 50000
  eval_dataset: "openai/gsm8k"
  eval_split: "test"
  eval_max_samples: 1319
  max_prompt_len: 512
  max_answer_len: 512

evaluation:
  task_type: "math"

logging:
  project: "aoae"
  run_name: "poc1_tau_sweep_sglang"
  log_every: 50
  output_dir: "outputs/sweeps/poc1_tau_sweep_sglang/"
  use_wandb: false

hardware:
  seed: 42
  bf16: true
  tp_size: 2
  deterministic: false
