# PoC 1: sweep routing temperature while holding the rest of the decode path fixed.

base_model:
  name_or_path: "inclusionAI/LLaDA2.1-mini"
  torch_dtype: "bfloat16"
  mask_token_id: 156895
  backend: "dual"
  routing_temperature: 0.1
  allow_python_fallback_ops: true
  soft_topk: 16

soft_mask:
  top_k: 5
  omega_s_init: 0.8
  omega_a_init: 1.0
  omega_b_init: 2.0

policy:
  d_model: 128
  n_layers: 1
  n_heads: 4
  dropout: 0.0
  use_positional_features: false
  use_age_feature: true
  use_last_action_feature: true
  boundary_head:
    enabled: false

prism:
  hidden_dim: 256
  threshold: 0.5
  train_samples: 1000
  epochs: 3
  lr: 1.0e-3
  batch_size: 4

cache:
  enabled: true

grpo:
  enabled: false

inference:
  steps: 32
  gen_length: 256
  temperature: 0.0
  fallback_unmask: true
  disable_remask: true
  compose_gamma: 0.0
  speculative_schedule: "llada21_block"
  llada21_official:
    use_block_diffusion: true
    max_post_steps: 16
    threshold: 0.7
    editing_threshold: 0.5
    enable_mbe: false
  positional_cache:
    enabled: false
  reuse_signal:
    method: "argmax_match"
    threshold: 0.0
  block_length: 32

analysis:
  track_kv_dynamics: false
  keep_step_traces: false

data:
  train_dataset: "nvidia/OpenMathInstruct-2"
  train_split: "train"
  train_max_samples: 5000
  eval_dataset: "openai/gsm8k"
  eval_split: "test"
  eval_max_samples: 100
  max_prompt_len: 512
  max_answer_len: 256

evaluation:
  task_type: "math"

logging:
  project: "aoae"
  run_name: "poc1"
  log_every: 50
  output_dir: "outputs/sweeps/poc1/"
  use_wandb: false

hardware:
  seed: 42
  bf16: true
  tp_size: 1
  deterministic: false
