# ============================================================
# POC 2 — Training-free Agreement for KV Reuse
#
# Goal: Which draft-derived signal reliably decides KV reuse
#       without causing drift/thrashing?
#
# Design: Fix τ_r=0.1, sweep reuse signals × thresholds.
#   - primary_every_n=1  → always run both models (need both logits for signal)
#   - disable_remask=false → realistic caching with invalidation
#   - compose_gamma=0     → pure primary prediction
#   - track_kv_dynamics   → measure thrash rate per config
#
# The reuse_signal_sweep script overrides signal method/threshold per point.
# ============================================================

base_model:
  name_or_path: "inclusionAI/LLaDA2.1-mini"
  torch_dtype: "bfloat16"
  mask_token_id: 156895
  backend: "dual"
  routing_temperature: 0.1           # fixed moderate τ_r
  allow_python_fallback_ops: true
  soft_topk: 16

soft_mask:
  top_k: 5
  omega_s_init: 0.8
  omega_a_init: 1.0
  omega_b_init: 2.0

policy:
  d_model: 128
  n_layers: 1
  n_heads: 4
  dropout: 0.0
  use_positional_features: false
  use_age_feature: true
  use_last_action_feature: true
  boundary_head:
    enabled: false

prism:
  hidden_dim: 256
  threshold: 0.5
  train_samples: 10000
  epochs: 3
  lr: 1.0e-3
  batch_size: 4

cache:
  enabled: true

grpo:
  enabled: false

inference:
  steps: 32
  gen_length: 512
  temperature: 0.0
  fallback_unmask: true
  disable_remask: false               # ON — realistic caching
  primary_every_n: 1                  # always run both for signal computation
  primary_agree_threshold: 0.0
  force_primary_first_last: false
  compose_gamma: 0.0                  # pure primary prediction
  positional_cache:
    enabled: false
  reuse_signal:
    method: "argmax_match"            # overridden by sweep
    threshold: 0.0
    top_k: 4
    min_overlap: 1
    min_streak: 2
    grid:
      argmax_match: [0.0]
      topk_overlap: [0.0]
      min_confidence: [0.3, 0.5, 0.7, 0.9]
      min_margin: [0.0, 0.1, 0.2, 0.4]
      js_divergence: [0.01, 0.03, 0.05, 0.1]
      temporal_confidence: [0.3, 0.5, 0.7]
  block_length: 32

analysis:
  track_kv_dynamics: true             # measure thrash rate
  keep_step_traces: true
  locality_windows: [8, 16, 32]
  confidence_threshold: 0.9
  attention_proxy_top_frac: 0.1

data:
  train_dataset: "nvidia/OpenMathInstruct-2"
  train_split: "train"
  train_max_samples: 50000
  eval_dataset: "openai/gsm8k"
  eval_split: "test"
  eval_max_samples: 1319
  max_prompt_len: 512
  max_answer_len: 256

evaluation:
  task_type: "math"

logging:
  project: "aoae"
  run_name: "poc2_reuse_signal"
  log_every: 50
  output_dir: "outputs/sweeps/poc2_reuse_signal_sweep/"
  use_wandb: false

hardware:
  seed: 42
  bf16: true
  tp_size: 2
  deterministic: false
