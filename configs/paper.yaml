# Canonical speculative AOAE config — stable KV cache GRPO run.
#
# Pivot from k=1 K_spec (2026-04-13): speculative speedup now comes from a lossy
# k>1 draft--validate schedule rather than a one-step accepted-mask skip.
# The auxiliary drafts every step; the soft primary/verifier runs every
# `primary_every_n` steps. K_spec is the transient drafted frontier awaiting
# verification, not a persistent cache of already accepted tokens.
#
# Stable KV cache (2026-04-12): primary-only, no drafter.
#   - Maintains stable_primary_kv across steps.
#   - Active positions = K_stable^c ∪ [MASK] (recomputed via cluster forward).
#   - Stable positions (in K_stable, not [MASK]) → KV reused exactly.
#   - Savings track K_stable size (policy κ_t driven), not total unmasked count.
#   - Age-decaying thrash penalty: exp(-0.1 * age), discourages premature commits.
#
# Changes from previous version:
#   - group_size: 2 → 8  (larger rollout groups → lower-variance advantage estimates)
#   - track_kv_dynamics: false → true  (hidden-state proxy drift tracking enabled)
#   - keep_step_traces: true  (per-step action ratios for detailed analysis)
#   - log_every: 50 → 10  (more frequent reward-curve data points)
#   - max_steps: 500 → 2000 (longer training horizon for group_size=8)
#   - cache_quality_weight: 0.05 → 0.1 (stronger F1 signal now it is computed correctly)
#   - kspec_skip: true → false  (K_spec disabled, stable_kv_cache enabled)
#   - stable_kv_cache: true  (stability-oriented real KV skip, primary only)
#   - thrash_age_decay: 0.1  (age-decaying thrash penalty)
#   - compose_gamma: 0.5 → 0.0  (no aux model in stable path, compose is no-op)

base_model:
  name_or_path: "inclusionAI/LLaDA2.1-mini"
  torch_dtype: "bfloat16"
  mask_token_id: 156895
  backend: "dual"
  routing_temperature: 0.1
  allow_python_fallback_ops: true
  soft_topk: 16

soft_mask:
  top_k: 5
  omega_s_init: 0.8
  omega_a_init: 1.0
  omega_b_init: 2.0

policy:
  d_model: 128
  n_layers: 1
  n_heads: 4
  dropout: 0.0
  use_positional_features: false
  use_age_feature: true
  use_last_action_feature: true
  boundary_head:
    enabled: false
    num_bins: 8

prism:
  hidden_dim: 256
  threshold: 0.5
  train_samples: 1000
  epochs: 3
  lr: 1.0e-3
  batch_size: 4

verifier:
  enabled: true
  kind: "prism"
  trainable: false
  artifact_name: "prism_adapter.pt"
  score_mode: "max_prob"
  hidden_dim: 256
  threshold: 0.5
  dropout: 0.0

cache:
  enabled: true
  # stable_kv_cache: stability-oriented real KV skip — NO drafter needed.
  #   Maintains a persistent primary KV cache (stable_primary_kv) across steps.
  #   Each step only recomputes "active" positions:
  #     active = changed-since-last-forward (newly unmasked / remasked)
  #             ∪ still-[MASK] positions (need fresh logits for decoding).
  #   Already-unmasked stable positions reuse cached primary KV exactly.
  #   Saving per step ≈ (fraction already unmasked) × (primary response FLOP).
  #   Savings grow as decoding progresses. No drafter tax.
  #   NOTE: now compatible with hidden-state verifiers by caching verifier hidden
  #   states alongside logits; still disabled only when track_kv_dynamics=true.
  stable_kv_cache: true
  # kspec_skip: enables the lossy k>1 speculative draft--validate path.
  #   Auxiliary drafts every step; the primary/verifier runs every
  #   inference.primary_every_n steps. K_spec stores drafted-but-not-yet-verified
  #   positions between those verifier passes.
  kspec_skip: false
  # prefix_kv_cache: cache prompt KVs for the auxiliary. Not applicable in stable path
  #   (no aux); kept false.
  prefix_kv_cache: false

grpo:
  enabled: true
  group_size: 8                    # ↑ from 2 — better advantage signal, lower variance
  clip_eps: 0.2
  alpha: 1.0                       # speed reward exponent
  beta: 0.1                        # thrash penalty weight (multiplied by age-weighted count)
  thrash_age_decay: 0.1            # exp(-decay*age) weight for thrash penalty; 0=uniform
  access_reward_weight: 0.0        # q_t head disabled until κ_t converges
  cache_quality_weight: 0.1        # ↑ from 0.05 — F1 now computed correctly in both paths
  stability_lambda: 10.0           # soft stability exponent λ (maps drift∈[0,0.2] → contrast)
  unresolved_penalty_weight: 0.25  # penalty for lingering [M] tokens at end of rollout
  min_checkpoint_reward: 0.0
  lr: 3.0e-4
  weight_decay: 0.01
  epochs: 3                        # ↑ from 2 — more epochs for larger max_steps
  max_steps: 2000                  # ↑ from 500 — longer run to see convergence
  batch_size: 1
  grad_accum_steps: 1              # ↓ from 4 — group_size=8 gives sufficient averaging
  warmup_steps: 100                # ↑ from 50 — proportional to larger max_steps
  max_grad_norm: 1.0
  policy_temperature: 1.0
  normalize_advantage_std: true    # recommended for group_size ≥ 8

inference:
  steps: 32
  gen_length: 256
  temperature: 0.0
  fallback_unmask: true
  disable_remask: false
  primary_every_n: 6           # speculative verifier cadence when cache.kspec_skip=true
  speculative_aux_cost_ratio: 0.15  # FLOP proxy for hard auxiliary vs. full soft primary
  primary_agree_threshold: 0.85
  positional_cache:
    enabled: true
    horizon: 4
    refresh_budget: 32
    candidate_policy: "learned_topb"
    window_radius: 8
    use_topb_from_probs: true
    force_mandatory: true
    age_cap: 64
  # reuse_signal: UNUSED in stable path — compute_reuse_signal() is skipped when
  # stable_kv_cache=true (agreement is set to zeros; no aux model to compare against).
  # Restore relevance when re-enabling the speculative path (kspec_skip=true).
  reuse_signal:
    method: "argmax_match"
    threshold: 0.0
    top_k: 4
    min_overlap: 1
    min_streak: 2
    grid:
      argmax_match: [0.0]
      topk_overlap: [0.0]
      min_confidence: [0.3, 0.5, 0.7, 0.9]
      min_margin: [0.0, 0.1, 0.2, 0.4]
      js_divergence: [0.01, 0.03, 0.05, 0.1]
      temporal_confidence: [0.3, 0.5, 0.7]
  block_length: 32
  compose_gamma: 0.0    # WAS 0.5 — disabled: stable path has no aux model, so dual-model
                        # composed prediction (α·pri + (1-α)·aux at agreed positions) is
                        # a no-op. Restore to 0.5 when re-enabling speculative+stability.

analysis:
  # KV dynamics tracking — uses PRIMARY model all-layer hidden states as a
  # hidden-state proxy for actual KV drift (no K/V extraction required).
  # Enabled here so the GRPO run produces training-time drift diagnostics
  # (stored in trajectory.kv_dynamics_summary, logged during eval phases).
  # NOTE: each step does a primary_forward_with_diagnostics() call instead of
  # primary_forward_with_hidden() when track_kv_dynamics=True, which is ~1.5×
  # slower.  Only enable during eval or short diagnostic runs; disable for
  # maximum throughput training (set to false).
  track_kv_dynamics: true
  track_attention_deviation: true  # per-layer attention deviation tracking
  keep_step_traces: true           # per-step action/mask ratios (for analysis)
  locality_windows: [8, 16, 32]
  confidence_threshold: 0.9
  attention_proxy_top_frac: 0.1

data:
  train_dataset: "nvidia/OpenMathInstruct-2"
  train_split: "train"
  train_max_samples: 5000
  eval_dataset: "openai/gsm8k"
  eval_split: "test"
  eval_max_samples: 100
  max_prompt_len: 512
  max_answer_len: 256

evaluation:
  task_type: "math"
  code:
    timeout_sec: 3.0
    cpu_time_limit_sec: 2
    memory_limit_mb: 1024

logging:
  project: "aoae"
  run_name: "paper_grpo_stable_kv"
  log_every: 10          # ↓ from 50 — more frequent JSONL/WandB data points
  eval_every: 200        # ↓ from 500 — more frequent eval snapshots
  save_every: 100        # ↓ from 500 — more frequent checkpoints
  output_dir: "outputs/paper/"
  use_wandb: "offline"   # offline — logs locally; sync later with `wandb sync`

hardware:
  seed: 42
  bf16: true
  tp_size: 2
  deterministic: false
