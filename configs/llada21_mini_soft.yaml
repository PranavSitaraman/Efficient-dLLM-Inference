# ============================================================
# AOAE — LLaDA2.1-mini with Soft-Routed MoE (paper §3.7)
#
# Uses the 16B MoE model with soft routing (all experts active)
# to create a dense-equivalent compute baseline for fair
# evaluation of AOAE throughput improvements.
#
# Key differences from default.yaml:
#   - backend: soft_moe (replaces hard top-k with soft softmax routing)
#   - routing_temperature: 0.01 (very low entropy, close to hard routing)
#   - compose_gamma: 0.5 (composed prediction for cache-aligned tokens)
#   - tp_size: 2 (LLaDA2.1-mini needs 2 GPUs for tensor parallelism)
# ============================================================

# ---- Base model (frozen, soft-routed MoE) ------------------
base_model:
  name_or_path: "inclusionAI/LLaDA2.1-mini"
  torch_dtype: "bfloat16"
  mask_token_id: 156895
  backend: "soft_moe"
  routing_temperature: 0.01    # tau_r: low = close to hard routing
  allow_python_fallback_ops: true

# ---- Soft-masked state (Eq. softmask + gating) -------------
soft_mask:
  top_k: 5
  omega_s_init: 0.8
  omega_a_init: 1.0
  omega_b_init: 2.0

# ---- AOAE policy network -----------------------------------
policy:
  d_model: 128
  n_layers: 1
  n_heads: 4
  dropout: 0.0
  use_positional_features: false
  use_age_feature: true
  use_last_action_feature: true
  boundary_head:
    enabled: false
    num_bins: 8

# ---- PRISM adapter ------------------------------------------
prism:
  hidden_dim: 256
  threshold: 0.5
  train_samples: 10000
  epochs: 3
  lr: 1.0e-3
  batch_size: 4

# ---- dKV-Cache ----------------------------------------------
cache:
  enabled: true

# ---- GRPO training ------------------------------------------
grpo:
  group_size: 8
  clip_eps: 0.2
  alpha: 1.0
  beta: 0.1
  access_reward_weight: 0.0
  lr: 3.0e-4
  weight_decay: 0.01
  epochs: 5
  max_steps: 50000
  batch_size: 2                # smaller batch for 16B model memory
  grad_accum_steps: 8
  warmup_steps: 200
  max_grad_norm: 1.0
  policy_temperature: 1.0

# ---- Diffusion inference ------------------------------------
inference:
  steps: 64
  gen_length: 256
  temperature: 0.0
  fallback_unmask: true
  disable_remask: false        # ablation: set true to disable remasking
  positional_cache:
    enabled: false
    horizon: 4
    refresh_budget: 32
    candidate_policy: "learned_topb"
    window_radius: 8
    use_topb_from_probs: true
    force_mandatory: true
    age_cap: 64
  reuse_signal:
    method: "argmax_match"     # argmax_match|topk_overlap|min_confidence|min_margin|js_divergence|temporal_confidence
    threshold: 0.0
    top_k: 4
    min_overlap: 1
    min_streak: 2
    grid:
      argmax_match: [0.0]
      topk_overlap: [0.0]
      min_confidence: [0.3, 0.5, 0.7, 0.9]
      min_margin: [0.0, 0.1, 0.2, 0.4]
      js_divergence: [0.01, 0.03, 0.05, 0.1]
      temporal_confidence: [0.3, 0.5, 0.7]
  block_length: 32
  compose_gamma: 0.5          # Composed prediction strength (paper §3.6)

analysis:
  track_kv_dynamics: false
  keep_step_traces: true
  locality_windows: [8, 16, 32]
  confidence_threshold: 0.9
  attention_proxy_top_frac: 0.1

# ---- Data ---------------------------------------------------
data:
  train_dataset: "nvidia/OpenMathInstruct-2"
  train_split: "train"
  train_max_samples: 50000
  eval_dataset: "openai/gsm8k"
  eval_split: "test"
  eval_max_samples: 1319
  max_prompt_len: 512
  max_answer_len: 256

evaluation:
  task_type: "math"
  code:
    timeout_sec: 3.0
    cpu_time_limit_sec: 2
    memory_limit_mb: 1024

# ---- Logging / checkpointing -------------------------------
logging:
  project: "aoae"
  run_name: "llada21_mini_soft"
  log_every: 50
  eval_every: 500
  save_every: 500
  output_dir: "outputs/llada21_mini_soft/"
  use_wandb: false

# ---- Hardware -----------------------------------------------
hardware:
  seed: 42
  bf16: true
  tp_size: 2                   # LLaDA2.1-mini needs 2-GPU TP
  deterministic: false
