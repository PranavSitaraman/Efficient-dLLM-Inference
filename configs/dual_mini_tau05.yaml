# ============================================================
# AOAE — Speculative Diffusion: τ_r = 0.5 (high divergence)
#
# Dual-model: hard-routed auxiliary (~1.4B active, fast) +
#             soft-routed primary (all 16B active, τ_r=0.5)
#
# At τ_r=0.5, significant divergence between primary and auxiliary.
# All experts contribute substantially. Potentially best quality,
# but fewer cache hits — policy must be selective about caching.
# ============================================================

base_model:
  name_or_path: "inclusionAI/LLaDA2.1-mini"
  torch_dtype: "bfloat16"
  mask_token_id: 156895
  backend: "dual"
  routing_temperature: 0.5

soft_mask:
  top_k: 5
  omega_s_init: 0.8
  omega_a_init: 1.0
  omega_b_init: 2.0

policy:
  d_model: 128
  n_layers: 1
  n_heads: 4
  dropout: 0.0

prism:
  hidden_dim: 256
  threshold: 0.5
  train_samples: 10000
  epochs: 3
  lr: 1.0e-3
  batch_size: 4

cache:
  enabled: true

grpo:
  enabled: false
  group_size: 2
  clip_eps: 0.2
  alpha: 1.0
  beta: 0.1
  lr: 3.0e-4
  weight_decay: 0.01
  epochs: 5
  max_steps: 5000
  batch_size: 1
  grad_accum_steps: 4
  warmup_steps: 50
  max_grad_norm: 1.0
  policy_temperature: 1.0

inference:
  steps: 256
  gen_length: 512
  temperature: 0.0
  fallback_unmask: true
  disable_remask: false        # ablation: set true to disable remasking
  block_length: 32
  compose_gamma: 0.5

data:
  train_dataset: "nvidia/OpenMathInstruct-2"
  train_split: "train"
  train_max_samples: 50000
  eval_dataset: "openai/gsm8k"
  eval_split: "test"
  eval_max_samples: 1319
  max_prompt_len: 512
  max_answer_len: 512

logging:
  project: "aoae"
  run_name: "dual_mini_tau05"
  log_every: 50
  eval_every: 500
  save_every: 500
  output_dir: "outputs/dual_mini_tau05/"
  use_wandb: false

hardware:
  seed: 42
  bf16: true
  tp_size: 2
