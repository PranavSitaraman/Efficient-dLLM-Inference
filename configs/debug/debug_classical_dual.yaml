# Debug Config 4: Classical confidence-threshold unmasking through dual backend
#
# HYPOTHESIS: The AOAE action space (remask, cache, access) introduces bugs or
# state corruption that degrades accuracy in the speculative path. This config
# strips everything down to confidence-threshold unmasking with full primary
# verification at every step — the simplest possible dual-backend inference.
#
# CHANGES:
#   train_heads: []         — all policy heads frozen (u_t=confidence, r_t=0,
#                             kappa_t=0, q_t=0)
#   cache.enabled: false    — no K_stable or K_spec tracking at all
#   cache.prefix_kv_cache: false — no transformer KV cache reuse between steps
#   inference.disable_remask: true  — belt-and-suspenders: no remask even if
#                             r_t were somehow nonzero
#   compose_gamma: 0.0      — token selection purely from primary logits
#   verifier_schedule:      — run primary verifier at EVERY step; no draft
#     mode: step_interval     microsteps. The auxiliary still runs for
#     step_interval: 1        comparison/agreement, but no speculative drafting
#   primary_agree_threshold: 0.0  — never force extra primary runs due to
#                             agreement falling below threshold
#
# WHAT THIS TESTS:
#   The dual model runs BOTH hard auxiliary and soft primary at every step.
#   Agreement is computed but purely for diagnostic purposes (not for K_spec).
#   Token selection is: argmax(primary_logits) at positions with
#   confidence >= 0.7 (confidence-threshold unmask, same as LLaDA 2.1 S-mode).
#   No caching, no remasking, no composition.
#
# EXPECTED RESULT:
#   This should behave identically to running llada21_quality_mode on the
#   soft-routed primary model alone. If accuracy is still ~10%, then the soft
#   routing itself (not the AOAE mechanics) is degrading predictions. If
#   accuracy recovers to ~80%, then the AOAE action space (remask/cache) is
#   causing the regression.
#
# RUN:
#   aoae eval --config configs/debug/debug_classical_dual.yaml \
#             --max_samples 20 --skip_baselines

base_model:
  name_or_path: "inclusionAI/LLaDA2.1-mini"
  torch_dtype: "bfloat16"
  mask_token_id: 156895
  backend: "dual"
  routing_temperature: 0.1
  allow_python_fallback_ops: true
  soft_topk: 16

soft_mask:
  top_k: 5
  omega_s_init: 0.8
  omega_a_init: 1.0
  omega_b_init: 2.0

policy:
  d_model: 128
  n_layers: 1
  n_heads: 4
  dropout: 0.0
  init_unmask_bias: -1.5
  init_remask_bias: -4.0
  init_cache_bias: -2.0
  init_access_bias: -2.0
  use_positional_features: false
  use_age_feature: true
  use_last_action_feature: true
  boundary_head:
    enabled: false
    num_bins: 8

prism:
  hidden_dim: 256
  threshold: 0.5
  train_samples: 1000
  epochs: 3
  lr: 1.0e-3
  batch_size: 4

cache:
  enabled: false           # <<< CHANGE: no K_stable/K_spec tracking
  stable_kv_cache: false
  kspec_skip: false
  prefix_kv_cache: false   # <<< CHANGE: no transformer KV cache reuse

grpo:
  enabled: true
  group_size: 8
  clip_eps: 0.2
  alpha: 1.0
  beta: 0.1
  thrash_normalization: "response_length"
  cache_speed_source: "none"
  cache_speed_credit_cap: 0.5
  thrash_age_decay: 0.1
  access_reward_weight: 0.0
  cache_quality_weight: 0.02
  stability_lambda: 10.0
  unresolved_penalty_weight: 0.25
  min_checkpoint_reward: -1.0
  lr: 3.0e-4
  weight_decay: 0.01
  epochs: 3
  max_steps: 2000
  batch_size: 1
  grad_accum_steps: 1
  warmup_steps: 100
  max_grad_norm: 1.0
  policy_temperature: 1.0
  normalize_advantage_std: true
  train_heads: []          # <<< CHANGE: empty list → all heads frozen/deterministic
  include_heads_in_logprob: ["cache", "access"]
  train_soft_mask: false
  rollout_steps: 16
  rollout_gen_length: 128

inference:
  steps: 64
  gen_length: 512
  temperature: 0.0
  fallback_unmask: true
  max_unmask_fraction_per_step: 0.125
  disable_remask: true     # <<< CHANGE: belt-and-suspenders, no remasking
  primary_every_n: 1       # <<< CHANGE: kept for compat; schedule below takes precedence
  verifier_schedule:
    mode: "step_interval"  # <<< CHANGE: was "candidate_budget"
    step_interval: 1       # <<< CHANGE: run primary verifier every single step
    force_first_last: true
  verifier:
    acceptance_mode: "argmax_match"
    rejection_action: "remask"
    use_prism_score: false
    prism_accept_threshold: 0.5
    recompute_after_reject: false  # <<< CHANGE: no recompute on reject (simplify flow)
  drafter:
    confidence_threshold: 0.7
    aux_compute_ratio: 0.35
  primary_agree_threshold: 0.0   # <<< CHANGE: never force extra primaries from low agreement
  aux_cache_reset_threshold: 1.1 # <<< CHANGE: never reset drafter cache
  positional_cache:
    enabled: false          # <<< CHANGE: disable positional cache entirely
  reuse_signal:
    method: "argmax_match"
    threshold: 0.0
  block_length: 32
  compose_gamma: 0.0       # <<< CHANGE: no composition; pure primary logits

analysis:
  track_kv_dynamics: false
  track_attention_deviation: false
  keep_step_traces: false
  log_speculative_config: true
  locality_windows: [8, 16, 32]
  confidence_threshold: 0.9
  attention_proxy_top_frac: 0.1

data:
  train_dataset: "nvidia/OpenMathInstruct-2"
  train_split: "train"
  train_max_samples: 5000
  eval_dataset: "openai/gsm8k"
  eval_split: "test"
  use_chat_template: "auto"
  math_prompt_style: "auto"
  gsm8k_num_fewshot: 0
  eval_max_samples: 20
  max_prompt_len: 512
  max_answer_len: 256

evaluation:
  task_type: "math"
  baseline_methods: []
  speculative_sweep:
    enabled: true
    points:
      - name: "debug_classical_dual"
        policy_temperature: 1.0
        overrides: {}

logging:
  project: "aoae_debug"
  run_name: "debug_classical_dual"
  log_every: 10
  eval_every: 200
  save_every: 100
  output_dir: "outputs/debug/classical_dual/"
  use_wandb: false

hardware:
  seed: 42
  bf16: true
  tp_size: 1
  deterministic: false
