# ============================================================
# LLaDA2.1-mini sanity eval — official Quality Mode
# ============================================================

base_model:
  name_or_path: "inclusionAI/LLaDA2.1-mini"
  torch_dtype: "bfloat16"
  mask_token_id: 156895
  backend: "dinfer"
  allow_python_fallback_ops: true

soft_mask:
  top_k: 5
  omega_s_init: 0.8
  omega_a_init: 1.0
  omega_b_init: 2.0

policy:
  d_model: 128
  n_layers: 1
  n_heads: 4
  dropout: 0.0
  use_positional_features: false
  use_age_feature: true
  use_last_action_feature: true
  boundary_head:
    enabled: false
    num_bins: 8

prism:
  hidden_dim: 256
  threshold: 0.5
  train_samples: 10000
  epochs: 3
  lr: 1.0e-3
  batch_size: 4

cache:
  enabled: false

grpo:
  enabled: false

inference:
  steps: 32
  gen_length: 512
  temperature: 0.0
  fallback_unmask: true
  disable_remask: false
  block_length: 32
  compose_gamma: 0.0
  llada21_official:
    use_block_diffusion: true
    max_post_steps: 16
    threshold: 0.7
    editing_threshold: 0.5
    enable_mbe: false

analysis:
  track_kv_dynamics: false
  keep_step_traces: false
  locality_windows: [8, 16, 32]
  confidence_threshold: 0.9
  attention_proxy_top_frac: 0.1

data:
  train_dataset: "nvidia/OpenMathInstruct-2"
  train_split: "train"
  train_max_samples: 50000
  eval_dataset: "openai/gsm8k"
  eval_split: "test"
  eval_max_samples: 1319
  max_prompt_len: 512
  max_answer_len: 512

evaluation:
  task_type: "math"
  baseline_methods: ["llada21_quality_mode"]
  code:
    timeout_sec: 3.0
    cpu_time_limit_sec: 2
    memory_limit_mb: 1024

logging:
  project: "aoae"
  run_name: "llada21_mini_official_quality"
  log_every: 50
  output_dir: "outputs/llada21_mini_official_quality/"
  use_wandb: false

hardware:
  seed: 42
  bf16: true
  tp_size: 2
  deterministic: false
