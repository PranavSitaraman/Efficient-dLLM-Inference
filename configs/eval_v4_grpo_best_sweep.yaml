# Eval config: v4_grpo_post_warmstart/policy_latest.pt (best checkpoint, step 200)
# 6 sweep points: quality_max, quality_max_hardver, quality_balanced,
#   quality_balanced_hardver, trained_tau05 (vanilla ckpt200), aoae_speed
# 50 samples, 1×H200, tp_size=1
extends: paper_smoke.yaml
phase_a_v2: true
stable_cache_enabled: false
feature_mode: scalar_only
phase_a_v2_config:
  feature_mode: scalar_only
  target_u_rate: 0.125
  target_r_rate: 0.02
policy:
  d_model: 128
  n_layers: 1
  n_heads: 4
  dropout: 0.0
  feature_mode: scalar_only
  target_u_rate: 0.125
  target_r_rate: 0.02
base_model:
  lossless_verification: true
cache:
  enabled: false
  stable_kv_cache: false
grpo:
  enabled: false
  train_heads: ["unmask", "remask"]
  include_heads_in_logprob: ["unmask", "remask"]
  unmask_scope: drafter
  remask_scope: verifier
inference:
  steps: 256
  gen_length: 512
  speculative_schedule: aoae
  max_unmask_fraction_per_step: 0.125
  disable_remask: false
  primary_agree_threshold: 0.5
  verifier:
    use_prism_score: true
    acceptance_mode: argmax_match
  drafter:
    run_on_verifier: never
    aux_compute_ratio: 0.0
    fast_path: false
  positional_cache:
    enabled: false
  verifier_schedule:
    mode: candidate_budget
    draft_token_budget: 12
    max_draft_microsteps: 4
data:
  eval_max_samples: 50
evaluation:
  generation_mode_filter: any_order
  baseline_methods: []
  speculative_sweep:
    enabled: true
    points:
      - name: quality_max
        policy_temperature: 0.7
        overrides:
          base_model.lossless_verification: false
          inference.speculative_schedule: aoae
          inference.verifier_schedule.mode: candidate_budget
          inference.verifier_schedule.draft_token_budget: 4
          inference.verifier_schedule.max_draft_microsteps: 1
          inference.primary_agree_threshold: 0.98
          inference.max_unmask_fraction_per_step: 0.0625
          inference.disable_remask: false
      - name: quality_max_hardver
        policy_temperature: 0.7
        overrides:
          base_model.lossless_verification: true
          inference.speculative_schedule: aoae
          inference.verifier_schedule.mode: candidate_budget
          inference.verifier_schedule.draft_token_budget: 4
          inference.verifier_schedule.max_draft_microsteps: 1
          inference.primary_agree_threshold: 0.98
          inference.max_unmask_fraction_per_step: 0.0625
          inference.disable_remask: false
      - name: quality_balanced
        policy_temperature: 1.0
        overrides:
          base_model.lossless_verification: false
          inference.speculative_schedule: aoae
          inference.verifier_schedule.mode: candidate_budget
          inference.verifier_schedule.draft_token_budget: 8
          inference.verifier_schedule.max_draft_microsteps: 3
          inference.primary_agree_threshold: 0.92
          inference.max_unmask_fraction_per_step: 0.125
          inference.disable_remask: false
      - name: quality_balanced_hardver
        policy_temperature: 1.0
        overrides:
          base_model.lossless_verification: true
          inference.speculative_schedule: aoae
          inference.verifier_schedule.mode: candidate_budget
          inference.verifier_schedule.draft_token_budget: 8
          inference.verifier_schedule.max_draft_microsteps: 3
          inference.primary_agree_threshold: 0.92
          inference.max_unmask_fraction_per_step: 0.125
          inference.disable_remask: false
      - name: trained_tau05
        policy_temperature: 0.5
        overrides:
          base_model.lossless_verification: true
          inference.speculative_schedule: aoae
          inference.verifier_schedule.mode: candidate_budget
          inference.verifier_schedule.draft_token_budget: 12
          inference.verifier_schedule.max_draft_microsteps: 4
          inference.primary_agree_threshold: 0.5
          inference.max_unmask_fraction_per_step: 0.125
          inference.disable_remask: false
      - name: aoae_speed
        policy_temperature: 1.5
        overrides:
          base_model.lossless_verification: true
          inference.speculative_schedule: aoae
          inference.verifier_schedule.mode: candidate_budget
          inference.verifier_schedule.draft_token_budget: 12
          inference.verifier_schedule.max_draft_microsteps: 4
          inference.primary_agree_threshold: 0.5
          inference.max_unmask_fraction_per_step: 0.125
          inference.disable_remask: false
hardware:
  tp_size: 1
logging:
  run_name: eval_v4_grpo_best_sweep
  output_dir: outputs/eval_v4_grpo_best_sweep/
  use_wandb: false
