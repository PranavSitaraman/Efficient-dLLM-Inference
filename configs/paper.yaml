# Submission-ready AOAE paper config.
#
# Canonical story:
#   1. Warm-start a scalar Phase-A/V2 u/r policy.
#   2. Continue with GRPO on GSM8K-style math rollouts.
#   3. Evaluate the same scalar policy on GSM8K, MATH-500, and HumanEval with
#      cache/access reward terms disabled. Stable-cache execution remains a
#      future-work path, not part of the final paper frontier.

phase_a_v2: true
stable_cache_enabled: false
feature_mode: scalar_only
train_heads: ["u", "r"]
warmstart_checkpoint: null
reward_cache_terms_enabled: false

phase_a_v2_config:
  feature_mode: scalar_only
  target_u_rate: 0.10
  target_r_rate: 0.02
  train_heads: ["u", "r"]
  warmstart_checkpoint: null
  stable_cache_enabled: false
  reward_cache_terms_enabled: false

base_model:
  name_or_path: "inclusionAI/LLaDA2.1-mini"
  torch_dtype: "bfloat16"
  mask_token_id: 156895
  backend: "dual"
  routing_temperature: 0.1
  allow_python_fallback_ops: true
  soft_topk: 16
  lossless_verification: false

soft_mask:
  top_k: 5
  omega_s_init: 0.8
  omega_a_init: 1.0
  omega_b_init: 2.0

policy:
  d_model: 128
  n_layers: 1
  n_heads: 4
  dropout: 0.0
  feature_mode: scalar_only
  target_u_rate: 0.10
  target_r_rate: 0.02
  init_unmask_bias: -1.5
  init_remask_bias: -4.0
  init_cache_bias: -2.0
  init_access_bias: -2.0
  use_positional_features: false
  use_age_feature: false
  use_last_action_feature: false
  use_hidden_state: false
  use_max_confidence_feature: true
  use_quality_score_feature: true
  boundary_head:
    enabled: false
    num_bins: 8
  block_wise:
    enabled: false
    context_left: 0

prism:
  hidden_dim: 256
  threshold: 0.5
  train_samples: 1000
  epochs: 3
  lr: 0.001
  batch_size: 4

cache:
  enabled: false
  stable_kv_cache: false
  prefix_kv_cache: true

warmstart:
  enabled: true
  feature_mode: scalar_only
  lr: 0.0001
  weight_decay: 0.01
  epochs: 1
  max_steps: 500
  max_samples: 1000
  max_grad_norm: 1.0
  low_confidence_threshold: 0.15
  lambda_rank: 0.1
  lambda_rate: 0.1
  lambda_hidden_gate: 0.0
  rollout_overrides:
    inference.steps: 256
    inference.gen_length: 512
    inference.speculative_schedule: aoae
    inference.verifier_schedule.mode: candidate_budget
    inference.verifier_schedule.draft_token_budget: 8
    inference.verifier_schedule.max_draft_microsteps: 3
    inference.primary_agree_threshold: 0.92
    inference.max_unmask_fraction_per_step: 0.125
    inference.disable_remask: false
    base_model.lossless_verification: false

grpo:
  enabled: true
  kl_coef: 0.01
  group_size: 4
  clip_eps: 0.2
  alpha: 1.0
  beta: 0.1
  thrash_normalization: "response_length"
  cache_speed_source: "none"
  cache_speed_credit_cap: 0.0
  access_reward_weight: 0.0
  cache_quality_weight: 0.0
  reward_cache_terms_enabled: false
  unresolved_penalty_weight: 0.25
  min_checkpoint_reward: -1.0
  warm_start_from: "outputs/paper_final/train/policy_final.pt"
  warm_start_strict: true
  expert_steering:
    enabled: false
  train_heads: ["unmask", "remask"]
  include_heads_in_logprob: ["unmask", "remask"]
  unmask_scope: "drafter"
  remask_scope: "verifier"
  train_soft_mask: false
  lr: 2.0e-5
  weight_decay: 0.01
  epochs: 1
  max_steps: 2700
  batch_size: 2
  grad_accum_steps: 2
  warmup_steps: 50
  max_grad_norm: 0.5
  policy_temperature: 1.0
  normalize_advantage_std: false
  save_every: 50
  rollout_steps: 256
  rollout_gen_length: 512
  rollout_overrides:
    base_model.lossless_verification: true
    inference.primary_agree_threshold: 0.5
    inference.verifier.use_prism_score: true
    inference.drafter.run_on_verifier: never
    inference.drafter.aux_compute_ratio: 0.0
    inference.positional_cache.enabled: false
    inference.drafter.fast_path: false

inference:
  speculative_schedule: "aoae"
  block_length: 32
  steps: 256
  gen_length: 512
  temperature: 0.0
  fallback_unmask: true
  max_unmask_fraction_per_step: 0.125
  disable_remask: false
  llada21_official:
    use_block_diffusion: true
    max_post_steps: 16
    gen_length: 512
    eos_early_stop: false
    enable_mbe: false
    speed:
      threshold: 0.5
      editing_threshold: 0.0
    quality:
      threshold: 0.7
      editing_threshold: 0.5
  verifier_schedule:
    mode: "candidate_budget"
    draft_token_budget: 8
    min_draft_microsteps: 1
    max_draft_microsteps: 3
    force_first_last: true
  verifier:
    acceptance_mode: "argmax_match"
    rejection_action: "remask"
    use_prism_score: true
    prism_accept_threshold: 0.5
    recompute_after_reject: true
  drafter:
    confidence_threshold: 0.7
    aux_compute_ratio: 0.35
    run_on_verifier: "auto"
    fast_path: false
  primary_agree_threshold: 0.92
  aux_cache_reset_threshold: 0.35
  positional_cache:
    enabled: false
    horizon: 4
    refresh_budget: 32
    candidate_policy: "learned_topb"
    window_radius: 8
    use_topb_from_probs: true
    force_mandatory: true
    age_cap: 64
  reuse_signal:
    method: "argmax_match"
    threshold: 0.0
    top_k: 4
    min_overlap: 1
    min_streak: 2
  block_speculative:
    draft_threshold: 0.5
    draft_editing_threshold: 0.0
    enable_draft_editing: false
    verifier_threshold: 0.7
    verifier_editing_threshold: 0.5
    max_verifier_steps_per_block: 8
    rejection_action: "correct_confident"
    verifier_mode: "primary"
    self_accept_min_confidence: 0.95
    force_verify_every_n_self_accepts: 0
  compose_gamma: 0

analysis:
  track_kv_dynamics: false
  track_attention_deviation: true
  keep_step_traces: true
  log_speculative_config: false
  locality_windows: [8, 16, 32]
  confidence_threshold: 0.9
  attention_proxy_top_frac: 0.1

data:
  train_dataset: "nvidia/OpenMathInstruct-2"
  train_split: "train"
  train_max_samples: 1000
  eval_dataset: "openai/gsm8k"
  eval_split: "test"
  eval_max_samples: 1319
  use_chat_template: "auto"
  math_prompt_style: "auto"
  gsm8k_num_fewshot: 0
  max_prompt_len: 512
  max_answer_len: 256

evaluation:
  task_type: "math"
  debug_logging: false
  save_predictions: true
  max_saved_predictions: 50
  generation_mode_filter: "all"
  baseline_methods:
    - "llada21_speed_mode"
    - "llada21_quality_mode"
    - "llada21_speed_anyorder"
    - "llada21_quality_anyorder"
    - "fast_dllm"
  speculative_sweep:
    enabled: true
    points:
      - name: "qbal_tau0.5_lossy"
        generation_mode: "any_order"
        policy_temperature: 0.5
        overrides:
          base_model.lossless_verification: false
          inference.speculative_schedule: aoae
          inference.verifier_schedule.mode: candidate_budget
          inference.verifier_schedule.draft_token_budget: 8
          inference.verifier_schedule.max_draft_microsteps: 3
          inference.primary_agree_threshold: 0.92
          inference.max_unmask_fraction_per_step: 0.125
          inference.disable_remask: false
      - name: "qbal_tau1.0_lossy"
        generation_mode: "any_order"
        policy_temperature: 1.0
        overrides:
          base_model.lossless_verification: false
          inference.speculative_schedule: aoae
          inference.verifier_schedule.mode: candidate_budget
          inference.verifier_schedule.draft_token_budget: 8
          inference.verifier_schedule.max_draft_microsteps: 3
          inference.primary_agree_threshold: 0.92
          inference.max_unmask_fraction_per_step: 0.125
          inference.disable_remask: false
      - name: "qbal_tau0.5_lossless"
        generation_mode: "any_order"
        policy_temperature: 0.5
        overrides:
          base_model.lossless_verification: true
          inference.speculative_schedule: aoae
          inference.verifier_schedule.mode: candidate_budget
          inference.verifier_schedule.draft_token_budget: 8
          inference.verifier_schedule.max_draft_microsteps: 3
          inference.primary_agree_threshold: 0.92
          inference.max_unmask_fraction_per_step: 0.125
          inference.disable_remask: false
      - name: "qbal_tau1.0_lossless"
        generation_mode: "any_order"
        policy_temperature: 1.0
        overrides:
          base_model.lossless_verification: true
          inference.speculative_schedule: aoae
          inference.verifier_schedule.mode: candidate_budget
          inference.verifier_schedule.draft_token_budget: 8
          inference.verifier_schedule.max_draft_microsteps: 3
          inference.primary_agree_threshold: 0.92
          inference.max_unmask_fraction_per_step: 0.125
          inference.disable_remask: false

hardware:
  tp_size: 1
  dp_size: 4
  seed: 42
  deterministic: false
  bf16: true

logging:
  run_name: "paper_train"
  output_dir: "outputs/paper_final/train/"
  log_every: 1
  save_every: 50
  use_wandb: true
