# Eval config: anyorder baselines only (no trained policy, no sweep)
# Run on H200 (seas_gpu) to match ckpt1 eval hardware for fair TPS comparison.
# Uses llada21_speed_anyorder + llada21_quality_anyorder so they pass the
# generation_mode_filter: any_order check in _get_baseline_methods.
extends: paper_smoke.yaml
data:
  eval_max_samples: 100
evaluation:
  generation_mode_filter: any_order
  baseline_methods:
    - llada21_speed_anyorder
    - llada21_quality_anyorder
  speculative_sweep:
    enabled: false
hardware:
  tp_size: 1
logging:
  run_name: eval_anyorder_baselines
  output_dir: outputs/eval_anyorder_baselines/
  use_wandb: false
