extends: paper_smoke.yaml
phase_a_v2: true
stable_cache_enabled: false
train_heads: ["u", "r"]
feature_mode: scalar_only
warmstart_checkpoint: null
target_u_rate: 0.125
target_r_rate: 0.02
reward_cache_terms_enabled: false
phase_a_v2_config:
  feature_mode: scalar_only
  target_u_rate: 0.125
  target_r_rate: 0.02
  train_heads: ["u", "r"]
  warmstart_checkpoint: null
  stable_cache_enabled: false
  reward_cache_terms_enabled: false
policy:
  d_model: 128
  n_layers: 1
  n_heads: 4
  dropout: 0.0
  feature_mode: scalar_only
  target_u_rate: 0.125
  target_r_rate: 0.02
cache:
  enabled: false
  stable_kv_cache: false
grpo:
  enabled: false
  train_heads: ["unmask", "remask"]
  include_heads_in_logprob: ["unmask", "remask"]
  train_soft_mask: false
  warm_start_from: null
  reward_cache_terms_enabled: false
  expert_steering:
    enabled: false
warmstart:
  enabled: true
  feature_mode: scalar_only
  lr: 0.0001
  weight_decay: 0.01
  epochs: 1
  max_steps: 500
  max_samples: 2000
  max_grad_norm: 1.0
  low_confidence_threshold: 0.15
  lambda_rank: 0.1
  lambda_rate: 0.1
  lambda_hidden_gate: 0.0
  rollout_overrides:
    # Match eval + GRPO (paper.yaml) rollout budget exactly so warmstart
    # trajectories match the GRPO / eval distribution.
    inference.steps: 256
    inference.gen_length: 512
    base_model.lossless_verification: true
    inference.primary_agree_threshold: 0.5
    inference.verifier.use_prism_score: true
    inference.drafter.run_on_verifier: never
    inference.drafter.aux_compute_ratio: 0.0
hardware:
  tp_size: 1
logging:
  run_name: v4_warmstart_scalar_only
  output_dir: outputs/v4_warmstart_scalar_only/
  log_every: 1
  save_every: 50
  use_wandb: true
