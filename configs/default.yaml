# ============================================================
# AOAE — Any-Order Adaptive Editing  (default / LLaDA-8B)
#
# Primary config for training and evaluation.  Uses the 8B
# dense model with the HuggingFace backend (no vLLM/TP needed).
# Matches paper §3.7: "LLaDA 2.1-Instruct (8B, frozen)".
#
# For the 100B MoE model, see configs/llada21_flash.yaml.
# ============================================================

# ---- Base model (frozen) -----------------------------------
base_model:
  name_or_path: "GSAI-ML/LLaDA-8B-Instruct"
  torch_dtype: "bfloat16"
  mask_token_id: 126336                          # [M] in LLaDA vocab
  backend: "hf"
  attn_implementation: "eager"

# ---- Soft-masked state (Eq. softmask + gating) -------------
soft_mask:
  top_k: 5                     # K in Eq. softmask
  omega_s_init: 0.8            # initial scale for gating sigmoid
  omega_a_init: 1.0            # slope parameter
  omega_b_init: 2.0            # bias / shift

# ---- AOAE policy network -----------------------------------
policy:
  d_model: 128                 # hidden dimension d_pi
  n_layers: 1                  # N_pi transformer layers (paper §3.4)
  n_heads: 4                   # attention heads
  dropout: 0.0
  use_positional_features: false # POC1 default: keep positional features disabled
  use_age_feature: true
  use_last_action_feature: true
  boundary_head:
    enabled: false
    num_bins: 8

# ---- PRISM adapter ------------------------------------------
prism:
  hidden_dim: 256
  threshold: 0.5               # delta — quality score threshold
  train_samples: 1000         # number of (corrupted, clean) pairs
  epochs: 3
  lr: 1.0e-3
  batch_size: 4

# ---- Verifier backend ---------------------------------------
# Controls how quality_scores are produced for the policy / speculative loop.
# Ablations:
#   - prism + trainable=false  → frozen PRISM sidecar
#   - prism + trainable=true   → unfrozen PRISM during GRPO
#   - learned_head             → fresh PRISM-like verifier head
#   - confidence               → logits-only heuristic verifier
verifier:
  enabled: true
  kind: "prism"
  trainable: false
  artifact_name: "prism_adapter.pt"
  score_mode: "max_prob"
  hidden_dim: 256
  threshold: 0.5
  dropout: 0.0

# ---- dKV-Cache ----------------------------------------------
cache:
  enabled: true
  # Legacy name retained for backward compatibility:
  #   kspec_skip=true enables the speculative draft--validate path, where K_spec
  #   is the transient drafted frontier awaiting the next verifier pass.
  kspec_skip: true
  stable_kv_cache: false
  prefix_kv_cache: false

# ---- GRPO training ------------------------------------------
grpo:
  group_size: 4                # Reproduction budget: batched rollouts per prompt
  clip_eps: 0.2                # epsilon for clipping (paper §3.5)
  alpha: 1.0                   # speed bonus exponent; applied to (1 - effective_flops)
  beta: 0.1                    # cache-thrashing penalty weight (paper §3.5)
  # Dense intermediate signals — important for credit assignment beyond sparse
  # terminal correctness.  These provide per-step gradients to the cache (κ_t)
  # and access (q_t) heads that the terminal reward alone cannot supply.
  access_reward_weight: 0.1    # F1 of next-H access prediction; trains the q_t head
  cache_quality_weight: 0.05   # soft precision-recall F1 reward for cache set quality;
                               # trains κ_t to commit stable positions (subsumes old drift penalty)
  stability_lambda: 10.0       # λ in stability(k) = exp(-λ * rel_drift_k); higher = sharper
                               # distinction between stable/unstable positions (good range: 5–20)
  unresolved_penalty_weight: 0.25  # keep no-progress / still-masked rollouts negative during training
  min_checkpoint_reward: 0.0   # pipeline will refuse to reuse checkpoints that never achieved non-negative mean reward
  lr: 3.0e-4
  weight_decay: 0.01
  epochs: 2
  max_steps: 512               # Reproduction-friendly cap: fits in a single 4h run
  batch_size: 4                # prompts per batch
  grad_accum_steps: 1
  warmup_steps: 25
  max_grad_norm: 1.0
  policy_temperature: 1.0      # tau_pi during training (1.0 = untempered)
  rollout_steps: 16            # Faster training-time horizon; eval still uses inference.steps
  rollout_gen_length: 128      # Faster training-time decode budget; eval remains 256

# ---- Diffusion inference ------------------------------------
inference:
  steps: 64                    # T diffusion steps
  gen_length: 256              # max response tokens
  temperature: 0.0             # base-model sampling temp (0 = greedy)
  fallback_unmask: true        # unmask highest-confidence when u_t = 0
  disable_remask: false        # ablation: set true to disable remasking
  primary_every_n: 1           # set >1 for lossy k>1 speculative draft--validate
  speculative_aux_cost_ratio: 0.15
  positional_cache:
    enabled: true              # enables age_feature and last_action_feature inputs to policy
    horizon: 4                 # next-H window for access prediction
    refresh_budget: 32         # additional non-mandatory positions per step
    candidate_policy: "learned_topb"  # learned_topb|sliding_window|confidence_topb
    window_radius: 8           # used by sliding_window candidate policy
    use_topb_from_probs: true  # top-B by access head probability
    force_mandatory: true      # always include unmask/remask positions in Q_t
    age_cap: 64                # normalize age feature by this cap
  reuse_signal:
    method: "argmax_match"
    threshold: 0.0
    top_k: 4
    min_overlap: 1
    min_streak: 2
    grid:
      argmax_match: [0.0]
      topk_overlap: [0.0]
      min_confidence: [0.3, 0.5, 0.7, 0.9]
      min_margin: [0.0, 0.1, 0.2, 0.4]
      js_divergence: [0.01, 0.03, 0.05, 0.1]
      temporal_confidence: [0.3, 0.5, 0.7]
  block_length: 32             # semi-AR block length
  compose_gamma: 0.5           # Composed prediction strength (paper §3.6)

# ---- Analysis ------------------------------------------------
analysis:
  track_kv_dynamics: true
  keep_step_traces: true
  locality_windows: [8, 16, 32]
  confidence_threshold: 0.9
  attention_proxy_top_frac: 0.1

# ---- Data ---------------------------------------------------
data:
  train_dataset: "nvidia/OpenMathInstruct-2"
  train_split: "train"
  train_max_samples: 1024      # Reproduction-friendly training subset
  eval_dataset: "openai/gsm8k"
  eval_split: "test"
  eval_max_samples: 100
  max_prompt_len: 512
  max_answer_len: 256

# ---- Evaluation ---------------------------------------------
evaluation:
  task_type: "math"            # math|code
  code:
    timeout_sec: 3.0
    cpu_time_limit_sec: 2
    memory_limit_mb: 1024

# ---- Logging / checkpointing -------------------------------
logging:
  project: "aoae"
  run_name: "default"
  log_every: 10
  eval_every: 500
  save_every: 25
  output_dir: "outputs/default/"
  use_wandb: false

# ---- Hardware -----------------------------------------------
hardware:
  seed: 42
  bf16: true
  deterministic: false
