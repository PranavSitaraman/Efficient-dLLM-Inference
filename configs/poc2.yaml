# PoC 2: sweep draft-derived reuse signals and thresholds at a fixed routing temperature.

base_model:
  name_or_path: "inclusionAI/LLaDA2.1-mini"
  torch_dtype: "bfloat16"
  mask_token_id: 156895
  backend: "dual"
  routing_temperature: 0.1
  allow_python_fallback_ops: true
  soft_topk: 16

soft_mask:
  top_k: 5
  omega_s_init: 0.8
  omega_a_init: 1.0
  omega_b_init: 2.0

policy:
  d_model: 128
  n_layers: 1
  n_heads: 4
  dropout: 0.0
  use_positional_features: false
  use_age_feature: true
  use_last_action_feature: true
  boundary_head:
    enabled: false

prism:
  hidden_dim: 256
  threshold: 0.5
  train_samples: 100
  epochs: 3
  lr: 1.0e-3
  batch_size: 4

cache:
  enabled: true

grpo:
  enabled: false

inference:
  steps: 32
  gen_length: 256
  temperature: 0.0
  fallback_unmask: true
  disable_remask: false
  compose_gamma: 0.0
  speculative_schedule: "llada21_block"
  llada21_official:
    use_block_diffusion: true
    max_post_steps: 16
    threshold: 0.7
    editing_threshold: 0.5
    enable_mbe: false
  positional_cache:
    enabled: false
  reuse_signal:
    method: "argmax_match"
    threshold: 0.0
    top_k: 4
    min_overlap: 1
    min_streak: 2
    grid:
      argmax_match: [0.0]
      topk_overlap: [0.0]
      min_confidence: [0.3, 0.5, 0.7, 0.9]
      min_margin: [0.0, 0.1, 0.2, 0.4]
      js_divergence: [0.01, 0.03, 0.05, 0.1]
      temporal_confidence: [0.3, 0.5, 0.7]
  block_length: 32

analysis:
  track_kv_dynamics: true
  keep_step_traces: true
  locality_windows: [8, 16, 32]
  confidence_threshold: 0.9
  attention_proxy_top_frac: 0.1

data:
  train_dataset: "nvidia/OpenMathInstruct-2"
  train_split: "train"
  train_max_samples: 100
  eval_dataset: "openai/gsm8k"
  eval_split: "test"
  use_chat_template: "auto"
  math_prompt_style: "auto"
  gsm8k_num_fewshot: 0
  eval_max_samples: 50
  max_prompt_len: 512
  max_answer_len: 256

evaluation:
  task_type: "math"

logging:
  project: "aoae"
  run_name: "poc2"
  log_every: 50
  output_dir: "outputs/sweeps/poc2/"
  use_wandb: false

hardware:
  seed: 42
  bf16: true
  # See comment in configs/paper.yaml: vLLM EP at tp_size>1 degrades MoE accuracy.
  tp_size: 1
  deterministic: false
