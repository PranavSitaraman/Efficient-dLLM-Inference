# ============================================================
# POC 1 — Soft Routing Trade-off
#
# Goal: Does soft-routed LLaDA 2.1 give a speed–quality tradeoff?
#
# Design: Sweep τ_r with everything else held fixed.
#   - primary_every_n=1  → always run both models (isolate routing effect)
#   - disable_remask=true → no remasking confound
#   - compose_gamma=0     → pure primary prediction (no blending)
#   - 32 diffusion steps  → matches official LLaDA 2.1 default
#   - 512 gen tokens      → matches official LLaDA 2.1 recommendation
#
# The tau_sweep script overrides routing_temperature per sweep point.
# Agreement rate is still logged, showing potential for primary skipping.
# ============================================================

base_model:
  name_or_path: "inclusionAI/LLaDA2.1-mini"
  torch_dtype: "bfloat16"
  mask_token_id: 156895
  backend: "dual"
  routing_temperature: 0.1          # overridden by sweep
  allow_python_fallback_ops: true
  soft_topk: 32                     # 2× top_k; fixed across all τ_r

soft_mask:
  top_k: 5
  omega_s_init: 0.8
  omega_a_init: 1.0
  omega_b_init: 2.0

policy:
  d_model: 128
  n_layers: 1
  n_heads: 4
  dropout: 0.0
  use_positional_features: false
  use_age_feature: true
  use_last_action_feature: true
  boundary_head:
    enabled: false

prism:
  hidden_dim: 256
  threshold: 0.5
  train_samples: 1000
  epochs: 3
  lr: 1.0e-3
  batch_size: 4

cache:
  enabled: true

grpo:
  enabled: false

inference:
  steps: 32
  gen_length: 512
  temperature: 0.0
  fallback_unmask: true
  disable_remask: true               # OFF — isolate routing effect
  primary_every_n: 1                 # always run both models
  primary_agree_threshold: 0.0       # no EMA-based primary forcing
  force_primary_first_last: false
  compose_gamma: 0.0                 # pure primary prediction
  positional_cache:
    enabled: false
  reuse_signal:
    method: "argmax_match"
    threshold: 0.0
  block_length: 32

analysis:
  track_kv_dynamics: false
  keep_step_traces: false

data:
  train_dataset: "nvidia/OpenMathInstruct-2"
  train_split: "train"
  train_max_samples: 5000
  eval_dataset: "openai/gsm8k"
  eval_split: "test"
  use_chat_template: "auto"
  math_prompt_style: "auto"
  gsm8k_num_fewshot: 0
  eval_max_samples: 50
  max_prompt_len: 512
  max_answer_len: 512

evaluation:
  task_type: "math"

logging:
  project: "aoae"
  run_name: "poc1_tau_sweep"
  log_every: 50
  output_dir: "outputs/sweeps/poc1_tau_sweep/"
  use_wandb: false

hardware:
  seed: 42
  bf16: true
  # See comment in configs/paper.yaml: vLLM EP at tp_size>1 degrades MoE accuracy.
  tp_size: 1
  deterministic: false
