# Lean eval: V5 GRPO v2 kl=0.03 best checkpoint, 50 samples (GSM8K), smoke check.
# Checkpoint: outputs/v5_grpo_post_warmstart_kl03_v2/policy_best.pt
extends: paper_smoke.yaml
phase_a_v2: true
stable_cache_enabled: false
feature_mode: v5_hybrid
phase_a_v2_config:
  feature_mode: v5_hybrid
  hidden_dim: 2048
  target_u_rate: 0.125
  target_r_rate: 0.02
policy:
  d_model: 128
  n_layers: 1
  n_heads: 4
  dropout: 0.0
  feature_mode: v5_hybrid
  hidden_dim: 2048
  target_u_rate: 0.125
  target_r_rate: 0.02
base_model:
  lossless_verification: false
cache:
  enabled: false
  stable_kv_cache: false
grpo:
  enabled: false
  train_heads: ["unmask", "remask"]
  include_heads_in_logprob: ["unmask", "remask"]
  unmask_scope: drafter
  remask_scope: verifier
inference:
  steps: 256
  gen_length: 512
  speculative_schedule: aoae
  max_unmask_fraction_per_step: 0.125
  disable_remask: false
  primary_agree_threshold: 0.92
  verifier:
    use_prism_score: true
    acceptance_mode: argmax_match
  drafter:
    run_on_verifier: never
    aux_compute_ratio: 0.0
    fast_path: false
  positional_cache:
    enabled: false
  verifier_schedule:
    mode: candidate_budget
    draft_token_budget: 8
    max_draft_microsteps: 3
data:
  eval_dataset: openai/gsm8k
  eval_split: test
  eval_max_samples: 50
evaluation:
  generation_mode_filter: any_order
  baseline_methods:
    - llada21_speed_mode
    - llada21_quality_mode
  speculative_sweep:
    enabled: true
    points:
      - name: v5kl03_tau0.5_lossy
        policy_temperature: 0.5
        overrides:
          base_model.lossless_verification: false
          inference.speculative_schedule: aoae
          inference.verifier_schedule.mode: candidate_budget
          inference.verifier_schedule.draft_token_budget: 8
          inference.verifier_schedule.max_draft_microsteps: 3
          inference.primary_agree_threshold: 0.92
          inference.max_unmask_fraction_per_step: 0.125
          inference.disable_remask: false
      - name: v5kl03_tau1.0_lossy
        policy_temperature: 1.0
        overrides:
          base_model.lossless_verification: false
          inference.speculative_schedule: aoae
          inference.verifier_schedule.mode: candidate_budget
          inference.verifier_schedule.draft_token_budget: 8
          inference.verifier_schedule.max_draft_microsteps: 3
          inference.primary_agree_threshold: 0.92
          inference.max_unmask_fraction_per_step: 0.125
          inference.disable_remask: false
      - name: v5kl03_tau0.5_lossless
        policy_temperature: 0.5
        overrides:
          base_model.lossless_verification: true
          inference.speculative_schedule: aoae
          inference.verifier_schedule.mode: candidate_budget
          inference.verifier_schedule.draft_token_budget: 8
          inference.verifier_schedule.max_draft_microsteps: 3
          inference.primary_agree_threshold: 0.92
          inference.max_unmask_fraction_per_step: 0.125
          inference.disable_remask: false
      - name: v5kl03_tau1.0_lossless
        policy_temperature: 1.0
        overrides:
          base_model.lossless_verification: true
          inference.speculative_schedule: aoae
          inference.verifier_schedule.mode: candidate_budget
          inference.verifier_schedule.draft_token_budget: 8
          inference.verifier_schedule.max_draft_microsteps: 3
          inference.primary_agree_threshold: 0.92
          inference.max_unmask_fraction_per_step: 0.125
          inference.disable_remask: false
hardware:
  tp_size: 1
logging:
  run_name: eval_lean_v5kl03
  output_dir: outputs/eval_lean_v5kl03/
  use_wandb: false
